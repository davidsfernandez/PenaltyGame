<!DOCTYPE html>
<html lang="es" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>Penalty Challenge | Production Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --glass-bg: rgba(0, 0, 0, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(16px);
            --primary: #00f260;
        }

        body {
            background-color: #050505;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* Essential for production interactivity */
        .interactive {
            pointer-events: auto !important;
        }
        
        input {
            user-select: text !important;
            -webkit-user-select: text !important;
        }
    </style>
</head>
<body class="h-full w-full bg-black text-white select-none">

    <main id="app-root" class="relative h-full w-full overflow-hidden bg-[#050505]">
        
        <!-- Layer 1: Render -->
        <section id="render-layer" class="absolute inset-0 z-0">
            <canvas id="game-canvas"></canvas>
        </section>

        <!-- Layer 2: UI Overlay -->
        <!-- Fixed: ui-layer is now interactive to allow children to work properly -->
        <section id="ui-layer" class="absolute inset-0 z-10 flex flex-col items-center justify-center p-6 pointer-events-none">
            
            <div id="ui-content-root" class="w-full max-w-md pointer-events-none flex flex-col items-center justify-center">
                
                <!-- Welcome Screen -->
                <div id="landing-screen" class="glass-panel p-10 rounded-3xl w-full interactive transition-all duration-700 opacity-100 shadow-2xl">
                    <div class="text-center mb-10">
                        <h1 class="text-5xl font-black tracking-tighter mb-2 italic">PENALTY<br><span class="text-[#00f260]">CHALLENGE</span></h1>
                        <div class="h-1 w-20 bg-[#00f260] mx-auto mb-4"></div>
                        <p class="text-[10px] opacity-50 uppercase tracking-[0.3em] font-bold">Autenticación Requerida</p>
                    </div>

                    <form id="auth-form" class="space-y-6">
                        <div class="relative">
                            <input type="text" id="credential-input" 
                                class="w-full bg-white/5 border-2 border-white/10 focus:border-[#00f260] rounded-2xl px-6 py-5 text-center text-2xl font-black tracking-widest outline-none transition-all placeholder:text-white/10 uppercase" 
                                placeholder="CÓDIGO" maxlength="12" spellcheck="false" autocomplete="off">
                        </div>
                        
                        <button type="submit" id="btn-submit-auth"
                            class="w-full bg-[#00f260] hover:bg-[#05d658] text-black font-black py-5 rounded-2xl transition-all active:scale-95 text-xl uppercase tracking-tighter shadow-[0_0_20px_rgba(0,242,96,0.3)]">
                            Iniciar Sesión
                        </button>
                        
                        <p id="validation-error" class="text-[#ff4b2b] text-center text-[10px] font-bold uppercase hidden tracking-widest">
                            Acceso Denegado: Verifique el código
                        </p>
                    </form>
                </div>

                <!-- Results Screen -->
                <div id="results-screen" class="glass-panel p-10 rounded-3xl w-full interactive transition-all duration-700 opacity-0 hidden shadow-2xl">
                    <!-- Results structure handled dynamically by game.js -->
                </div>

            </div>

        </section>

    </main>

    <script type="module" src="js/game.js"></script>
</body>
</html>
