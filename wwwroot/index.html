<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Penalty Challenge | Phaser 3 Production</title>
    
    <!-- Phaser 3 Engine -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <!-- Typography: Bebas Neue for arcade feel -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f260;
            --accent: #00d2ff;
            --bg-glass: rgba(0, 0, 0, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Roboto', sans-serif;
        }

        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column;
        }

        /* Standard Screen Container */
        .screen {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: auto;
            transition: opacity 0.5s ease, visibility 0.5s;
            opacity: 0; visibility: hidden;
        }
        .screen.active { opacity: 1; visibility: visible; }

        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 400px; width: 90%;
        }

        h1, h2 { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; }
        .title { font-size: 4rem; line-height: 0.9; margin-bottom: 10px; }
        .highlight { color: var(--primary); }

        /* HUD */
        .hud-container {
            display: flex; justify-content: space-between;
            padding: 20px; color: white; width: 100%; pointer-events: none;
        }
        .hud-item {
            background: var(--bg-glass);
            padding: 10px 25px; border-radius: 15px; border: 1px solid var(--border-glass);
            text-align: center;
        }
        .hud-label { font-size: 10px; font-weight: 900; opacity: 0.6; letter-spacing: 1px; }
        .hud-value { font-size: 28px; font-family: 'Bebas Neue'; color: var(--primary); }

        /* Buttons */
        .btn {
            background: var(--primary); color: black;
            border: none; padding: 15px 40px; border-radius: 12px;
            font-family: 'Bebas Neue'; font-size: 1.5rem;
            cursor: pointer; transition: transform 0.1s, background 0.2s;
            margin-top: 20px; width: 100%;
        }
        .btn:hover { background: #05d658; }
        .btn:active { transform: scale(0.95); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-overlay">
        <!-- 1. HUD (Active during play) -->
        <header id="game-hud" class="hud-container hidden">
            <div class="hud-item">
                <span class="hud-label">PUNTUACIÃ“N</span>
                <span id="score-display" class="hud-value">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">RACHA</span>
                <span id="streak-display" class="hud-value">x0</span>
            </div>
        </header>

        <!-- 2. Welcome Screen -->
        <section id="screen-welcome" class="screen active">
            <div class="glass-panel">
                <h1 class="title">PENALTY<br><span class="highlight">CHALLENGE</span></h1>
                <p style="opacity: 0.6; margin-bottom: 30px;">PROYECTO DE PRODUCCIÃ“N FINAL</p>
                <button id="btn-start" class="btn">INICIAR JUEGO</button>
            </div>
        </section>

        <!-- 3. Results Screen -->
        <section id="screen-results" class="screen">
            <div class="glass-panel">
                <h2 style="font-size: 3rem; margin-bottom: 10px;">¡FIN DEL JUEGO!</h2>
                <div style="margin: 20px 0;">
                    <p style="opacity: 0.6; font-size: 0.8rem;">TU PUNTAJE FINAL</p>
                    <p id="final-score" style="font-size: 4rem; font-family: 'Bebas Neue'; color: var(--primary);">0</p>
                </div>
                <button id="btn-restart" class="btn">REINTENTAR</button>
            </div>
        </section>
    </div>

    <script type="module" src="js/game.js"></script>
</body>
</html>
