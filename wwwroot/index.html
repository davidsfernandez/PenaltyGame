<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Game - Arcade Challenge</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div class="ui-overlay">
            <div class="score-board">
                <div id="score-label">PUNTUACIÓN: <span id="score-value">0</span></div>
                <div id="level-label">NIVEL: <span id="level-value">1</span></div>
            </div>
            <div class="message-area" id="message-area">
                ¡DESLIZA PARA TIRAR!
            </div>
            <div id="ui-controls" style="text-align: center; pointer-events: auto;">
                <!-- Controls like 'Reiniciar' could go here if needed -->
            </div>
        </div>
    </div>

    <script type="module" src="js/game.js"></script>
</body>
</html>
