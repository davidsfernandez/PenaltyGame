<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>Penalty Challenge | Experiencia Interactiva</title>
    
    <meta name="description" content="Demuestra tu maestría en el campo con el Desafío de Penales.">
    
    <!-- Domain 37: Critical Inline Shell -->
    <style>
        :root { --primary-glow: #00f260; --accent-blue: #00d2ff; --ui-bg: rgba(0, 0, 0, 0.85); --font-main: 'Segoe UI', Roboto, sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: var(--font-main); color: white; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #111; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #222 0%, #000 100%); }
        .content-box { background: var(--ui-bg); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .title { font-size: 3rem; font-weight: 900; line-height: 0.9; margin-bottom: 10px; }
        .highlight { color: var(--primary-glow); }
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        #token-input { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 8px; color: white; text-align: center; width: 150px; }
        .btn-primary { background: var(--primary-glow); color: black; border: none; padding: 0 25px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-overlay { position: relative; z-index: 10; pointer-events: none; height: 100%; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div class="ui-overlay" id="ui-root" data-state="LANDING">
            <section class="screen" id="screen-landing">
                <div class="content-box">
                    <h1 class="title">PENALTY<br><span class="highlight">CHALLENGE</span></h1>
                    <p class="subtitle">Ingresa tu código de acceso para jugar</p>
                    <div class="input-group">
                        <input type="text" id="token-input" placeholder="CÓDIGO" maxlength="12">
                        <button id="btn-validate" class="btn-primary">ENTRAR</button>
                    </div>
                    <p id="login-error" style="color:#ff4b2b; margin-top:10px; display:none"></p>
                </div>
            </section>

            <!-- Other screens (tutorial, results, hud) hidden by default -->
            <section class="screen" id="screen-tutorial" style="display:none"></section>
            <section class="screen" id="screen-results" style="display:none"></section>
            <header class="hud" id="game-hud" style="display:none"></header>
        </div>
    </div>

    <!-- Deferred Assets (Domain 31) -->
    <script type="module" src="js/game.js"></script>
</body>
</html>
