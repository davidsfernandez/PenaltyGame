<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Penalty Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #222; }
        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #ui-layer { position: absolute; top: 10%; width: 100%; text-align: center; pointer-events: none; color: white; font-family: sans-serif; font-size: 2rem; font-weight: bold; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="score-text">PUNTOS: 0</div>
        <div id="message-text"></div>
    </div>
    <div id="game-container"></div>
    <script type="module" src="js/game.js"></script>
</body>
</html>
