<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Penalty Challenge | Phaser 3 Production</title>
    
    <!-- Phaser 3 Engine -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f260;
            --accent: #00d2ff;
            --error: #ff4b2b;
            --bg-glass: rgba(0, 0, 0, 0.85);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Roboto', sans-serif;
        }

        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column;
        }

        .screen {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: auto;
            transition: opacity 0.5s ease, visibility 0.5s;
            opacity: 0; visibility: hidden;
        }
        .screen.active { opacity: 1; visibility: visible; }

        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            max-width: 450px; width: 90%;
        }

        h1, h2 { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; }
        .title { font-size: 4rem; line-height: 0.9; margin-bottom: 10px; }
        .highlight { color: var(--primary); }

        /* Form Elements */
        .input-group { margin: 25px 0; }
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 18px;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            outline: none;
            transition: border-color 0.3s;
            pointer-events: auto;
            user-select: text !important;
        }
        input:focus { border-color: var(--primary); }

        .error-msg {
            color: var(--error);
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* HUD */
        .hud-container {
            display: flex; justify-content: space-between;
            padding: 20px; color: white; width: 100%; pointer-events: none;
        }
        .hud-item {
            background: var(--bg-glass);
            padding: 10px 25px; border-radius: 15px; border: 1px solid var(--border-glass);
            text-align: center; pointer-events: auto;
        }
        .hud-label { font-size: 10px; font-weight: 900; opacity: 0.6; letter-spacing: 1px; }
        .hud-value { font-size: 28px; font-family: 'Bebas Neue'; color: var(--primary); }

        /* Buttons */
        .btn {
            background: var(--primary); color: black;
            border: none; padding: 18px 40px; border-radius: 15px;
            font-family: 'Bebas Neue'; font-size: 1.8rem;
            cursor: pointer; transition: transform 0.1s, background 0.2s;
            width: 100%; pointer-events: auto;
        }
        .btn:hover { background: #05d658; }
        .btn:active { transform: scale(0.96); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-overlay">
        <!-- HUD -->
        <header id="game-hud" class="hud-container hidden">
            <div class="hud-item">
                <span class="hud-label">PUNTUACIÃ“N</span>
                <span id="score-display" class="hud-value">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">RACHA</span>
                <span id="streak-display" class="hud-value">x0</span>
            </div>
        </header>

        <!-- Welcome Screen -->
        <section id="screen-welcome" class="screen active">
            <div class="glass-panel">
                <h1 class="title">PENALTY<br><span class="highlight">CHALLENGE</span></h1>
                <p style="opacity: 0.6; margin-bottom: 5px;">PROYECTO DE PRODUCCIÃ“N FINAL</p>
                
                <div class="input-group">
                    <input type="text" id="credential-input" placeholder="CÃ“DIGO" maxlength="12" spellcheck="false" autocomplete="off">
                    <p id="validation-error" class="error-msg hidden">Credencial invÃ¡lida o vacÃ­a</p>
                </div>

                <button id="btn-start" class="btn">ENTRAR AL CAMPO</button>
            </div>
        </section>

        <!-- Results Screen -->
        <section id="screen-results" class="screen">
            <div class="glass-panel">
                <h2 style="font-size: 3.5rem; margin-bottom: 10px;">¡FIN DEL JUEGO!</h2>
                <div style="margin: 30px 0;">
                    <p style="opacity: 0.6; font-size: 0.9rem; text-transform: uppercase; font-weight: 900;">Tu Puntaje Final</p>
                    <p id="final-score" style="font-size: 5rem; font-family: 'Bebas Neue'; color: var(--primary); line-height: 1;">0</p>
                </div>
                
                <div id="leaderboard-body" style="margin-bottom: 30px; max-height: 200px; overflow-y: auto;">
                    <!-- Rows will be injected here -->
                </div>

                <button id="btn-restart" class="btn">REINTENTAR</button>
            </div>
        </section>
    </div>

    <script type="module" src="js/game.js"></script>
</body>
</html>
